  <div id="app" role="application" aria-label="Vet Buddies"></div>

  <script>
    // Nuclear SW cache bust — runs before app.js to break the stale-cache cycle.
    // The old SW (v1) used stale-while-revalidate and hit CSP errors on background
    // fetches, so it could never update its cache. This inline script runs even when
    // the old SW serves a cached index.html because Netlify's _headers CSP allows
    // 'unsafe-inline'. Once all SWs are unregistered and caches cleared, the fresh
    // sw.js (v3, network-first) will be registered by app.js on the next load.
    (function() {
      var SW_VERSION = 3; // bump this to force another cache bust
      var key = 'vetbuddies_sw_version';
      try {
        var stored = parseInt(localStorage.getItem(key) || '0', 10);
        if (stored < SW_VERSION && 'serviceWorker' in navigator) {
          navigator.serviceWorker.getRegistrations().then(function(regs) {
            regs.forEach(function(r) { r.unregister(); });
          });
          caches.keys().then(function(keys) {
            keys.forEach(function(k) { caches.delete(k); });
          });
          localStorage.setItem(key, String(SW_VERSION));
          // Reload once so the browser fetches everything fresh from the network
          if (stored > 0) { window.location.reload(); }
        }
      } catch(e) {}
    })();
  </script>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
  <script src="config.js"></script>
  <script src="utils.js"></script>
  <script src="resource-documents.js"></script>
  <script src="app.js"></script>
</body>
